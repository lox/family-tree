# fly.toml app configuration file generated for lox-family-tree on 2026-07-18T19:51:46+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lox-family-tree'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = '5s'
    interval = '30s'
    method = 'GET'
    path = '/'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
