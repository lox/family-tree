<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Tree</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main class="app-shell" id="app">
    <header class="app-header">
      <div class="app-title">
        <h1>Family tree</h1>
      </div>
      <div class="header-actions">
        <div class="relationship-filter-control">
          <button class="relationship-filter-trigger" id="relationship-filter-trigger" type="button" aria-expanded="false" aria-controls="relationship-filter-popover" aria-haspopup="dialog">
            <svg class="control-icon" viewBox="0 0 20 20" aria-hidden="true">
              <path d="M3 4h14l-5.5 6.2v4.7l-3 1.5v-6.2z"/>
            </svg>
            <span id="relationship-filter-trigger-label">Filter</span>
            <span class="relationship-filter-active-dot" aria-hidden="true"></span>
          </button>
          <button class="relationship-filter-clear" id="relationship-filter-clear" type="button" aria-label="Clear relationship filter" hidden>×</button>
          <section class="relationship-filter-popover" id="relationship-filter-popover" role="dialog" aria-label="Filter relatives" hidden>
            <header class="relationship-filter-heading">
              <span>Filter relatives</span>
              <strong id="relationship-filter-anchor">Select a person</strong>
            </header>
            <div class="relationship-filter-presets" role="group" aria-label="Filter presets">
              <button type="button" data-filter-preset="full">Full tree</button>
              <button type="button" data-filter-preset="immediate">Immediate family</button>
              <button type="button" data-filter-preset="family">Family branch</button>
              <button type="button" data-filter-preset="ancestors">Ancestors</button>
              <button type="button" data-filter-preset="descendants">Descendants</button>
            </div>
            <fieldset class="relationship-filter-options" id="relationship-filter-options">
              <legend>Customise</legend>
              <label>
                <span>Ancestor generations</span>
                <select id="relationship-filter-ancestor-depth">
                  <option value="0">None</option>
                  <option value="1">Parents</option>
                  <option value="2">2 generations</option>
                  <option value="3">3 generations</option>
                  <option value="all">All</option>
                </select>
              </label>
              <label>
                <span>Descendant generations</span>
                <select id="relationship-filter-descendant-depth">
                  <option value="0">None</option>
                  <option value="1">Children</option>
                  <option value="2">2 generations</option>
                  <option value="3">3 generations</option>
                  <option value="all">All</option>
                </select>
              </label>
              <label class="relationship-filter-check"><input id="relationship-filter-partners" type="checkbox"> Partners of selected person</label>
              <label class="relationship-filter-check"><input id="relationship-filter-siblings" type="checkbox"> Siblings</label>
              <label class="relationship-filter-check"><input id="relationship-filter-descendant-partners" type="checkbox"> Partners of descendants</label>
            </fieldset>
          </section>
        </div>
        <button class="search-trigger" id="person-search-trigger" type="button" aria-haspopup="dialog" aria-controls="person-search-dialog" aria-keyshortcuts="Meta+K Control+K" aria-label="Find a person">
          <svg class="control-icon" viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5.25"/>
            <path d="m12.5 12.5 4 4"/>
          </svg>
          <span>Find</span>
          <kbd>⌘K</kbd>
        </button>
        <div class="settings-control">
          <button class="settings-trigger" id="settings-trigger" type="button" aria-expanded="false" aria-controls="settings-popover" aria-haspopup="dialog">
            <svg class="control-icon" viewBox="0 0 20 20" aria-hidden="true">
              <path d="M3 5h7M14 5h3M10 3v4M3 10h3M10 10h7M6 8v4M3 15h9M16 15h1M12 13v4"/>
            </svg>
            <span>Settings</span>
          </button>
          <section class="settings-popover" id="settings-popover" role="dialog" aria-label="Presentation settings" hidden>
            <div class="settings-heading">Appearance</div>
            <label class="settings-option" for="setting-sex-colors">
              <span class="settings-option-copy">
                <strong>Colour people by sex</strong>
                <small>Use subtle accents when sex is recorded.</small>
              </span>
              <input id="setting-sex-colors" type="checkbox" role="switch">
            </label>
            <div class="sex-colour-key" id="sex-colour-key" hidden>
              <span><i class="sex-swatch is-male"></i>Male</span>
              <span><i class="sex-swatch is-female"></i>Female</span>
              <span><i class="sex-swatch is-unknown"></i>Unspecified</span>
            </div>
            <label class="settings-size" for="setting-card-scale">
              <span class="settings-option-copy">
                <strong>Person box size</strong>
                <small>Fit more people or make each card easier to read.</small>
              </span>
              <span class="settings-range-control">
                <input id="setting-card-scale" type="range" min="80" max="130" step="10" value="100">
                <output id="setting-card-scale-value" for="setting-card-scale">100%</output>
              </span>
            </label>
          </section>
        </div>
        <label class="file-control">
          <span>Open GEDCOM</span>
          <input id="ged-file" type="file" accept=".ged,text/plain">
        </label>
      </div>
    </header>

    <div class="tree-meta">
      <p id="tree-summary" aria-live="polite"></p>
      <details class="import-report" id="import-report">
        <summary id="import-report-summary"></summary>
        <div class="import-report-card" id="import-report-card"></div>
      </details>
      <p class="privacy-note">Select a person to trace their relationship path. · Shift-click to compare two people. · Double-click for a family branch. · GED files stay in this browser.</p>
    </div>
    <dialog class="person-search-dialog" id="person-search-dialog" aria-labelledby="person-search-title">
      <section class="person-search-panel">
        <h2 class="visually-hidden" id="person-search-title">Find a person</h2>
        <div class="person-search-input-row">
          <svg class="person-search-icon" viewBox="0 0 20 20" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5.25"/>
            <path d="m12.5 12.5 4 4"/>
          </svg>
          <input id="person-search-input" type="search" placeholder="Find a person…" autocomplete="off" spellcheck="false" aria-controls="person-search-results" aria-autocomplete="list">
          <button class="person-search-close" id="person-search-close" type="button" aria-label="Close search">Esc</button>
        </div>
        <div class="person-search-mode" id="person-search-mode" role="group" aria-label="Search action" hidden>
          <button type="button" data-search-mode="select" aria-pressed="true">Go to person</button>
          <button type="button" data-search-mode="compare" aria-pressed="false">
            Compare with <strong id="person-search-compare-anchor"></strong>
          </button>
        </div>
        <div class="person-search-results" id="person-search-results" role="listbox" aria-label="People"></div>
        <footer class="person-search-footer">
          <span><kbd>↑</kbd><kbd>↓</kbd> Navigate</span>
          <span><kbd>↵</kbd> <span id="person-search-submit-label">Open</span></span>
        </footer>
      </section>
    </dialog>
    <div class="tree-workspace" id="tree-workspace" data-dock="right">
      <div class="tree-scroll">
        <p class="error-message" id="error-message" role="alert" hidden></p>
        <section class="tree-stage" aria-label="Family tree canvas">
          <svg id="family-tree" role="img" aria-labelledby="tree-title tree-description">
            <title id="tree-title">Interactive family tree</title>
            <desc id="tree-description">Family groups arranged in compact generation lanes.</desc>
          </svg>
        </section>
      </div>
      <div class="pane-resizer" id="pane-resizer" role="separator" tabindex="0" hidden></div>
      <aside class="inspector-pane" id="person-inspector" aria-label="Selected person details" aria-live="polite" hidden></aside>
    </div>
  </main>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
